name: Daily Pipeline

on:
  schedule:
    - cron: "30 15 * * *"   # 10:30 AM ET
    - cron: "0 23 * * *"    # 06:00 PM ET
  workflow_dispatch:
    inputs:
      slot:
        description: "morning or evening"
        default: "morning"
      topic:
        description: "Topic ID (blank = random)"
        default: ""

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg fonts-dejavu-core
          pip install Pillow numpy --quiet

      - name: Detect slot
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot }}" ]; then
            echo "slot=${{ github.event.inputs.slot }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H)
            [ "$HOUR" = "15" ] && echo "slot=morning" >> $GITHUB_OUTPUT || echo "slot=evening" >> $GITHUB_OUTPUT
          fi

      - name: Run pipeline
        env:
          GMAIL_ADDRESS:     ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          NOTIFY_EMAIL:      ${{ secrets.NOTIFY_EMAIL }}
          GH_PAT:            ${{ secrets.GH_PAT }}
          GH_REPO:           ${{ github.repository }}
          PIPELINE_SECRET:   ${{ secrets.PIPELINE_SECRET }}
          GITHUB_RUN_ID:     ${{ github.run_id }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: |
          TOPIC_ARG=""
          [ -n "${{ github.event.inputs.topic }}" ] && TOPIC_ARG="--topic ${{ github.event.inputs.topic }}"
          python3 scripts/pipeline.py --slot ${{ steps.slot.outputs.slot }} $TOPIC_ARG